<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dust Collection</title>

<link rel="stylesheet" href="style.css">

<!-- Firebase CDN -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

<script src="firebase.js"></script>
<script defer src="app.js"></script>
</head>

<body>

<header>
  <h1>🖤 Dust Collection</h1>

  <input id="search" placeholder="Search fashion..." oninput="filterProducts()">

  <div class="categories">
    <button onclick="filter('all')">All</button>
    <button onclick="filter('hoodie')">Hoodies</button>
    <button onclick="filter('shirt')">T-Shirts</button>
    <button onclick="filter('pants')">Pants</button>
  </div>

  <div onclick="toggleCart()">🛒 <span id="cartCount">0</span></div>
</header>

<section id="products"></section>

<section class="hero">
  <h2>NEW DROP 🔥</h2>
  <p>Streetwear that defines you</p>
</section>

<section id="products" class="products"></section>

<!-- CART -->
<div id="cart" class="cart">
  <h2>Your Cart</h2>
  <ul id="cartItems"></ul>
  <p>Total: P<span id="total">0</span></p>
  <button onclick="checkout()">Checkout</button>
  <button onclick="toggleCart()">Close</button>
</div>

</body>
</html>
